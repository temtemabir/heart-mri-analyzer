name: heartmrianalyzer
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.0
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.5
  firebase_auth: ^5.5.1
  image_picker: ^0.8.5+3
  cached_network_image: ^3.2.3
  http: ^0.13.0
  image: ^3.0.2
  path_provider: ^2.0.11
  path: ^1.8.2
  dio: ^5.0.0
  flutter_svg: ^2.0.7
  intl: ^0.19.0
  timezone: ^0.9.1
  firebase_database: ^11.3.5
  rxdart: ^0.27.7
  table_calendar: ^3.1.0

flutter:
  assets:
    - assets/logo.png
    - assets/heart_image.png
    - assets/heart_logo.png
    - assets/icons/
    - assets/translations/
    - assets/labels.txt
  uses-material-design: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
